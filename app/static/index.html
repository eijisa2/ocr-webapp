<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OCR - Image/PDF to Text</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      background: #111;
      color: #eaeaea;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      width: 100vw;
      height: 100%;
    }
    .main-wrap {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      width: 100vw;
    }
    .left-panel {
      background: #181818;
      min-width: 320px;
      max-width: 360px;
      width: 28vw;
      border-radius: 0 22px 22px 0;
      box-shadow: 3px 0 18px #101a1a55;
      display: flex;
      flex-direction: column;
      padding: 44px 22px 28px 36px;
      height: 100vh;
      position: sticky;
      top: 0;
    }
    .form-area {
      margin-bottom: 26px;
    }
    .title {
      font-weight: 600;
      font-size: 1.33em;
      color: #fff;
      margin-bottom: 22px;
    }
    .dropzone {
      border: 2px dashed #444;
      background: #21222c;
      border-radius: 12px;
      padding: 28px 0;
      text-align: center;
      color: #bbb;
      margin-bottom: 17px;
      transition: border-color .2s, background .15s;
      width: 100%;
    }
    .dropzone.dragover {
      border-color: #79a8ff;
      background: #181c27;
      color: #fff;
    }
    .browse-link {
      color: #85b7ff;
      text-decoration: underline;
      cursor: pointer;
    }
    button {
      margin-top: 16px;
      background: linear-gradient(90deg, #6a80fd, #3d50aa);
      color: #fff;
      border-radius: 9px;
      padding: 10px 32px;
      font-size: 1.07em;
      cursor: pointer;
      width: 100%;
      border: none;
    }
    .reset-btn {
      background: #1b1d26;
      border: 1px solid #323a4d;
      color: #96a9d7;
    }
    .file-list-label {
      font-weight: bold;
      font-size: 1.10em;
      margin-bottom: 10px;
      color: #8ac8ff;
    }
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 0;
      width: 100%;
    }
    .file-tag {
      background: #1d2836;
      border-radius: 7px;
      padding: 6px 15px;
      color: #d3dfff;
      font-size: 1em;
      box-shadow: 0 1px 5px #1212125e;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .file-date {
      font-size: .89em;
      color: #64d6b7;
      margin-left: 13px;
    }
    .right-panel {
      flex: 1;
      max-width: 920px;
      padding: 44px 4vw 32px 38px;
    }
    .output-title {
      font-size: 1.29em;
      color: #eee;
      font-weight: 600;
      margin-bottom: 20px;
      margin-top: 0;
    }
    .output-wrap {
      width: 100%;
      background: #181a20;
      border-radius: 13px;
      padding: 24px;
      font-size: 1.07em;
      color: #e2e2e2;
      min-height: 130px;
      box-shadow: 0 2px 16px #202020a7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .output-file-header {
      color: #93b6fa;
      font-size: 1.04em;
      font-weight: bold;
      margin-bottom: 2px;
      margin-top: 26px;
      letter-spacing: .2px;
      display: inline-block;
    }
    .langtag {
      color: #4be4d9;
      background: #21243a;
      padding: 2px 9px;
      border-radius: 6px;
      font-size: .93em;
      margin-left: 8px;
    }
    .origin-date {
      display: inline-block;
      font-size: .84em;
      color: #8df5c4;
      margin-left: 8px;
      letter-spacing: .04em;
    }
    .divider {
      border-top: 1.2px solid #242d35;
      margin: 20px 0 18px 0;
      width: 90%;
    }
  </style>
</head>
<body>
  <div class="main-wrap">
    <div class="left-panel">
      <div class="form-area">
        <div class="title">OCR - Image/PDF to Text</div>
        <form id="ocrForm" autocomplete="off">
          <div class="dropzone" id="dropzone">
            <input type="file" id="files" name="files" multiple accept=".jpg,.jpeg,.png,.pdf,.bmp,.tiff,.gif" style="display:none;">
            <span id="dropzone-status">Drop files here</span>
            <span> or </span>
            <label for="files" class="browse-link">browse</label>
          </div>
          <div style="margin:10px 0;">
            <label>Language:
              <select id="language">
                <option value="auto">Auto</option>
                <option value="en">English</option>
                <option value="tr">Turkish</option>
                <option value="ru">Russian</option>
                <option value="es">Spanish</option>
              </select>
            </label>
          </div>
          <button type="submit">Extract Text</button>
          <button type="button" id="resetBtn" class="reset-btn">Reset Workflow</button>
          <div id="progress" class="progress"></div>
        </form>
      </div>
      <div>
        <div class="file-list-label">Uploaded Files</div>
        <div class="file-list" id="fileList"></div>
      </div>
    </div>
    <div class="right-panel">
      <div class="output-title">Extracted Texts</div>
      <div id="result" class="output-wrap">
        <span style="color:#999;">OCR results will appear here.</span>
      </div>
    </div>
  </div>
<script>
document.addEventListener("DOMContentLoaded", () => {

  const dropzone = document.getElementById("dropzone");
  const filesInput = document.getElementById("files");
  const fileListDiv = document.getElementById("fileList");
  const resultDiv = document.getElementById("result");
  const progressDiv = document.getElementById("progress");
  const dropzoneStatus = document.getElementById("dropzone-status");
  const resetBtn = document.getElementById("resetBtn");
  const RESULTS_PLACEHOLDER = `<span style="color:#999;">OCR results will appear here.</span>`;
  const defaultDropzoneStatus = dropzoneStatus.textContent;
  const fileDateMap = new Map();
  let uploadedFiles = [];
  let ocrResults = [];

  // Dropzone tıklama davranışı (sadece label ve input hariç)
  dropzone.addEventListener("click", (e) => {
    if (e.target.closest("label") || e.target === filesInput) return;
    filesInput.click();
  });

  dropzone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropzone.classList.add("dragover");
  });

  dropzone.addEventListener("dragleave", () => {
    dropzone.classList.remove("dragover");
  });

  dropzone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropzone.classList.remove("dragover");
    filesInput.files = e.dataTransfer.files;
    showUploadedFiles();
  });

  filesInput.addEventListener("change", showUploadedFiles);
  resetBtn.addEventListener("click", resetWorkflow);

  function showUploadedFiles() {
    uploadedFiles = Array.from(filesInput.files);
    uploadedFiles.sort((a, b) => a.lastModified - b.lastModified);
    fileListDiv.innerHTML = '';
    fileDateMap.clear();
    uploadedFiles.forEach(file => {
      const div = document.createElement('div');
      div.className = 'file-tag';
      div.innerHTML = `${file.name}<span class="file-date">${formatDate(file.lastModified)}</span>`;
      fileListDiv.appendChild(div);
      fileDateMap.set(file.name, file.lastModified);
    });
    dropzoneStatus.textContent = uploadedFiles.length
      ? `${uploadedFiles.length} file(s) ready for OCR`
      : defaultDropzoneStatus;
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
  }

  document.getElementById('ocrForm').onsubmit = async (e) => {
    e.preventDefault();
    resultDiv.innerHTML = '';
    progressDiv.textContent = 'Uploading and processing...';
    ocrResults = [];
    if (!uploadedFiles.length) {
      progressDiv.textContent = 'Please select at least one file.';
      return;
    }
    const lang = document.getElementById('language').value;
    const data = new FormData();
    for (const file of uploadedFiles) data.append('files', file);
    data.append('language', lang);
    try {
      const res = await fetch('/api/upload', { method: 'POST', body: data });
      if (res.ok) {
        const json = await res.json();
        if (!json.results || !json.results.length) {
          resultDiv.innerHTML = "<span style='color:#c66;'>No valid file found or OCR failed.</span>";
          progressDiv.textContent = '';
          return;
        }
        ocrResults = json.results.slice().sort((a, b) => {
          return getOriginalDateValue(a) - getOriginalDateValue(b);
        });
        showAllOcrResults();
        progressDiv.textContent = 'Done!';
      } else {
        resultDiv.innerHTML = '<span style="color:#c66;">An error occurred!</span>';
        progressDiv.textContent = '';
      }
    } catch (err) {
      resultDiv.innerHTML = '<span style="color:#c66;">Request failed!</span>';
      progressDiv.textContent = '';
    }
  };

  function showAllOcrResults() {
    if (!ocrResults.length) {
      resultDiv.innerHTML = RESULTS_PLACEHOLDER;
      return;
    }
    resultDiv.innerHTML = ocrResults.map((r) => `
      <div class="divider"></div>
      <div class="output-file-header">${r.filename}
        <span class="langtag">${r.language}</span>
        ${buildOriginDate(r)}
      </div>
      <div style="margin:8px 0 2px 0;">${r.text ? r.text.replace(/</g,"&lt;") : "<i>No text extracted</i>"}</div>
    `).join('');
  }

  function buildOriginDate(result) {
    const label = getOriginalDateLabel(result);
    return label ? `<span class="origin-date">${label}</span>` : '';
  }

  function getOriginalDateLabel(result) {
    const ts = fileDateMap.get(result.filename);
    if (ts) {
      return `Created: ${formatDate(ts)}`;
    }
    if (result.date) {
      return `Uploaded: ${formatApiDate(result.date)}`;
    }
    return '';
  }

  function getOriginalDateValue(result) {
    const ts = fileDateMap.get(result.filename);
    if (ts) {
      return ts;
    }
    return result.date ? new Date(result.date).getTime() : 0;
  }

  function formatApiDate(dateStr) {
    const parts = dateStr.split(" ");
    return parts[0] + " " + (parts[1] || "");
  }

  function resetWorkflow() {
    filesInput.value = "";
    uploadedFiles = [];
    ocrResults = [];
    fileDateMap.clear();
    fileListDiv.innerHTML = '';
    dropzoneStatus.textContent = defaultDropzoneStatus;
    progressDiv.textContent = '';
    resultDiv.innerHTML = RESULTS_PLACEHOLDER;
  }

});
</script>
<div style="position:fixed; right:15px; bottom:14px; color:#4fa2d9; font-size:1em; font-family:monospace; opacity:.62; pointer-events:none; z-index:99;">
  Designed by eijisa2
</div>
</body>
</html>
